services:
  # ============================================
  # Nginx Reverse Proxy
  # ============================================
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nextolymp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL certificates (production uchun)
      # - ./ssl:/etc/nginx/ssl:ro
    networks:
      - nextolymp

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: nextolymp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-nextolympservice}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextolymp

  # ============================================
  # Redis Cache / Session Store
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: nextolymp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextolymp

  # ============================================
  # Go Backend API
  # ============================================
  backend:
    build:
      context: ./go-backend
      dockerfile: Dockerfile
    container_name: nextolymp-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      APP_PORT: "8080"
      APP_ENV: "production"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-nextolympservice}
      DB_SSLMODE: "disable"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY_HOURS: ${JWT_ACCESS_EXPIRY_HOURS:-1}
      JWT_REFRESH_EXPIRY_HOURS: ${JWT_REFRESH_EXPIRY_HOURS:-168}
      PANEL_JWT_ACCESS_SECRET: ${PANEL_JWT_ACCESS_SECRET}
      PANEL_JWT_REFRESH_SECRET: ${PANEL_JWT_REFRESH_SECRET}
      PANEL_JWT_ACCESS_EXPIRY_HOURS: ${PANEL_JWT_ACCESS_EXPIRY_HOURS:-8}
      PANEL_JWT_REFRESH_EXPIRY_HOURS: ${PANEL_JWT_REFRESH_EXPIRY_HOURS:-168}
      UPLOAD_DIR: "/app/uploads"
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: "0"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://nextolymp.uz}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - nextolymp

  # ============================================
  # Next.js Frontend
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://nextolymp.uz/api/v1}
    container_name: nextolymp-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://nextolymp.uz/api/v1}
    networks:
      - nextolymp

  # ============================================
  # Telegram Bot
  # ============================================
  telegrambot:
    build:
      context: ./codebot-main
      dockerfile: Dockerfile
    container_name: nextolymp-telegrambot
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      BACKEND_WEBHOOK_URL: http://backend:8080/api/v1/telegram/webhook
      CODE_TTL_MINUTES: "10"
    networks:
      - nextolymp

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

networks:
  nextolymp:
    driver: bridge
