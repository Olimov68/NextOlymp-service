name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_COMPOSE_FILE: docker-compose.prod.yml

jobs:
  # ============================================
  # 1. Test & Build
  # ============================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Go Build Test
        working-directory: ./go-backend
        run: |
          go mod download
          go build ./...

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend Build Test
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: https://nextolymp.uz/api/v1
        run: |
          npm ci --legacy-peer-deps
          npm run build

  # ============================================
  # 2. Deploy to Server
  # ============================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            # Project papkasiga o'tish
            cd ${{ secrets.PROJECT_PATH || '/opt/nextolymp' }}

            # Yangi kodni tortib olish
            git pull origin main

            # .env faylini yaratish (agar yo'q bo'lsa)
            if [ ! -f .env ]; then
              echo "ERROR: .env fayli topilmadi! Avval .env faylini yarating."
              exit 1
            fi

            # Docker imagelarni qayta build qilish va ishga tushirish
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d

            # Eski imagelarni tozalash
            docker image prune -f

            # Health check
            echo "Waiting for services to be healthy..."
            sleep 15

            # Backend health
            curl -sf http://localhost:8080/health || {
              echo "Backend health check failed!"
              docker compose -f docker-compose.prod.yml logs backend --tail 50
              exit 1
            }

            echo "Deployment successful!"
